name: "HA COPS"
version: "2.2.3"
slug: "ha-cops"
description: "Minimal Calibre library web interface"
url: "https://github.com/dunxd/HomeAssistantAddons/tree/main/COPS"
panel_icon: mdi:library
panel_title: Book Library (COPS)
panel_admin: false
advanced: false
stage: stable
webui: "http://[HOST]:[PORT:8000]/index.php"
arch:
  - aarch64
  - amd64
init: false
discovery:
  - COPS
  - korrosync
  - rsync
ingress: true
ingress_port: 8000
ports:
  8000/tcp: 8000
  873/tcp: 8873
map:
  - media:rw
options:
  title: "COPS"
  library_folder: books
  rsync: true
  reader: monocle
  koreader_sync: false
schema:
  title: str
  library_folder: str
  rsync: bool
  reader: list(monocle|epubjs)
  smtp_host: str?
  smtp_username: str?
  smtp_password: password?
  smtp_secure: list(ssl|tls)?
  smtp_port: int?
  address_from: email?
  custom_cols: str?
  koreader_sync: bool
